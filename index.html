<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Монитор статусов</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; padding: 40px 20px; }
    h1 { text-align: center; font-size: 2rem; margin-bottom: 6px; color: #3ecf8e; }
    .subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 0.9rem; }
    .container { max-width: 620px; margin: 0 auto; }
    #auth-screen { display: none; flex-direction: column; align-items: center; }
    .auth-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 36px 32px; width: 100%; max-width: 400px; }
    .auth-tabs { display: flex; background: #111; border-radius: 10px; padding: 4px; margin-bottom: 28px; }
    .auth-tab { flex: 1; padding: 9px; border: none; background: transparent; color: #666; cursor: pointer; border-radius: 8px; font-size: 0.9rem; transition: all 0.2s; }
    .auth-tab.active { background: #2a2a2a; color: #3ecf8e; font-weight: 600; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 11px 14px; background: #111; border: 1px solid #2a2a2a; border-radius: 9px; color: #e0e0e0; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: #3ecf8e; }
    .submit-btn { width: 100%; padding: 12px; background: #3ecf8e; color: #000; border: none; border-radius: 9px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
    .submit-btn:hover { background: #2eb87a; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: #444; font-size: 0.8rem; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:#2a2a2a; }
    .google-btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 11px; background: #fff; color: #333; border: none; border-radius: 9px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .google-btn:hover { background: #f0f0f0; }
    .google-btn svg { width: 18px; height: 18px; }
    .auth-msg { border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; margin-bottom: 16px; display: none; }
    .auth-msg.error { background:#ff444422; border:1px solid #ff4444; color:#ff6666; }
    .auth-msg.success { background:#3ecf8e22; border:1px solid #3ecf8e; color:#3ecf8e; }
    #app-screen { display: none; }
    .user-bar { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px 20px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .user-bar-left { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 38px; height: 38px; border-radius: 50%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #3ecf8e; font-size: 1rem; border: 2px solid #3ecf8e44; flex-shrink: 0; overflow: hidden; }
    .user-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .user-name { font-weight: 600; font-size: 0.95rem; }
    .user-email { font-size: 0.78rem; color: #666; }
    .logout-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid #333; background: transparent; color: #888; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
    .logout-btn:hover { border-color: #ff4444; color: #ff4444; }
    .online-indicator { background: #1a1a1a; border: 1px solid #3ecf8e33; border-radius: 12px; padding: 16px 22px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
    .online-left { display: flex; align-items: center; gap: 14px; }
    .online-circle { width: 52px; height: 52px; border-radius: 50%; background: #3ecf8e15; border: 2px solid #3ecf8e44; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 800; color: #3ecf8e; }
    .online-text-main { font-size: 1rem; font-weight: 600; color: #e0e0e0; }
    .online-text-sub { font-size: 0.78rem; color: #666; margin-top: 2px; }
    .online-avatars { display: flex; }
    .mini-avatar { width: 30px; height: 30px; border-radius: 50%; background: #2a2a2a; border: 2px solid #3ecf8e; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; color: #3ecf8e; margin-left: -8px; flex-shrink: 0; }
    .mini-avatar:first-child { margin-left: 0; }
    .section-title { font-size: 0.8rem; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 18px 22px; margin-bottom: 12px; display: flex; align-items: center; gap: 16px; transition: border-color 0.2s; }
    .card:hover { border-color: #3ecf8e44; }
    .card.me { border-color: #3ecf8e33; }
    .avatar { width: 46px; height: 46px; border-radius: 50%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: bold; color: #3ecf8e; flex-shrink: 0; overflow: hidden; }
    .avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .info { flex: 1; }
    .username { font-weight: 600; font-size: 1rem; margin-bottom: 4px; }
    .status-text { font-size: 0.85rem; color: #aaa; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot.online { background: #3ecf8e; box-shadow: 0 0 6px #3ecf8e; }
    .dot.offline { background: #555; }
    .chat-box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; margin-top: 8px; overflow: hidden; }
    .chat-header { padding: 14px 20px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; gap: 10px; }
    .chat-header-dot { width: 8px; height: 8px; border-radius: 50%; background: #3ecf8e; box-shadow: 0 0 6px #3ecf8e; animation: pulse 1.5s infinite; }
    .chat-title { font-weight: 600; font-size: 0.95rem; color: #3ecf8e; }
    .chat-messages { height: 300px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .chat-msg { display: flex; gap: 10px; align-items: flex-start; animation: msgIn 0.2s ease-out; }
    @keyframes msgIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .chat-msg.mine { flex-direction: row-reverse; }
    .chat-msg-avatar { width: 32px; height: 32px; border-radius: 50%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; color: #3ecf8e; flex-shrink: 0; border: 1px solid #3ecf8e33; }
    .chat-msg-body { max-width: 75%; }
    .chat-msg-name { font-size: 0.72rem; color: #666; margin-bottom: 3px; }
    .chat-msg.mine .chat-msg-name { text-align: right; }
    .chat-msg-bubble { padding: 9px 13px; border-radius: 12px; font-size: 0.9rem; line-height: 1.4; word-break: break-word; }
    .chat-msg.mine .chat-msg-bubble { background: #3ecf8e; color: #000; border-bottom-right-radius: 3px; }
    .chat-msg.theirs .chat-msg-bubble { background: #2a2a2a; color: #e0e0e0; border-bottom-left-radius: 3px; }
    .chat-msg-time { font-size: 0.68rem; color: #555; margin-top: 3px; }
    .chat-msg.mine .chat-msg-time { text-align: right; }
    .chat-input-row { display: flex; gap: 10px; padding: 14px 16px; border-top: 1px solid #2a2a2a; background: #111; }
    .chat-input { flex: 1; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 9px; color: #e0e0e0; padding: 10px 14px; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    .chat-input:focus { border-color: #3ecf8e; }
    .chat-send-btn { padding: 10px 18px; background: #3ecf8e; color: #000; border: none; border-radius: 9px; font-weight: 700; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .chat-send-btn:hover { background: #2eb87a; }
    .chat-empty { text-align: center; color: #444; padding: 40px 20px; font-size: 0.85rem; }
    .realtime-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 0.75rem; color: #3ecf8e; background: #3ecf8e11; border: 1px solid #3ecf8e33; border-radius: 20px; padding: 4px 10px; margin-bottom: 24px; }
    .pulse { width: 7px; height: 7px; border-radius: 50%; background: #3ecf8e; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .msg { text-align: center; color: #555; padding: 30px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Монитор статусов</h1>
    <p class="subtitle">Обновляется в реальном времени</p>

    <div id="auth-screen">
      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchTab('login')">Войти</button>
          <button class="auth-tab" onclick="switchTab('register')">Регистрация</button>
        </div>
        <div id="auth-msg" class="auth-msg"></div>
        <div id="login-form">
          <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="your@email.com"/></div>
          <div class="form-group"><label>Пароль</label><input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')signInEmail()"/></div>
          <button class="submit-btn" onclick="signInEmail()">Войти</button>
        </div>
        <div id="register-form" style="display:none">
          <div class="form-group"><label>Имя пользователя</label><input type="text" id="reg-name" placeholder="Как тебя зовут?"/></div>
          <div class="form-group"><label>Email</label><input type="email" id="reg-email" placeholder="your@email.com"/></div>
          <div class="form-group"><label>Пароль</label><input type="password" id="reg-password" placeholder="Минимум 6 символов" onkeydown="if(event.key==='Enter')signUpEmail()"/></div>
          <button class="submit-btn" onclick="signUpEmail()">Зарегистрироваться</button>
        </div>
        <div class="divider">или</div>
        <button class="google-btn" onclick="signInGoogle()">
          <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.5 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.3 26.8 36 24 36c-5.3 0-9.7-3.3-11.3-8H6.4C9.7 35.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.3 4.2-4.1 5.6l6.2 5.2C37.1 39 44 34 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>
          Войти через Google
        </button>
      </div>
    </div>

    <div id="app-screen">
      <div style="text-align:center;margin-bottom:24px;">
        <span class="realtime-badge"><span class="pulse"></span>Realtime подключён</span>
      </div>
      <div class="user-bar">
        <div class="user-bar-left">
          <div class="user-avatar" id="header-avatar">?</div>
          <div>
            <div class="user-name" id="header-name">...</div>
            <div class="user-email" id="header-email">...</div>
          </div>
        </div>
        <button class="logout-btn" onclick="signOut()">Выйти</button>
      </div>
      <div class="online-indicator">
        <div class="online-left">
          <div class="online-circle" id="online-count">0</div>
          <div>
            <div class="online-text-main">Сейчас онлайн</div>
            <div class="online-text-sub" id="online-sub">из всех пользователей</div>
          </div>
        </div>
        <div class="online-avatars" id="online-avatars"></div>
      </div>
      <div class="section-title">Все пользователи</div>
      <div id="users-list"><div class="msg">Загрузка...</div></div>
      <div class="chat-box">
        <div class="chat-header">
          <div class="chat-header-dot"></div>
          <div class="chat-title">Общий чат</div>
        </div>
        <div class="chat-messages" id="chat-messages">
          <div class="chat-empty">Сообщений пока нет. Напиши первым! 👋</div>
        </div>
        <div class="chat-input-row">
          <input class="chat-input" id="chat-input" placeholder="Написать сообщение..." onkeydown="if(event.key==='Enter')sendMessage()"/>
          <button class="chat-send-btn" onclick="sendMessage()">Отправить</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://lbsnhkenepmhigbofqae.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxic25oa2VuZXBtaGlnYm9mcWFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MjI0ODgsImV4cCI6MjA5MTE5ODQ4OH0.42Cd7d5v6gVe4dP-LwQbamsu3AC4ghT8x_jfte5SG2I';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    let myId = null, myName = '';
    let rtSubscribed = false, chatSubscribed = false;
    let loginInProgress = false;
    let gotSession = false;

    // ONLINE COUNTER
    function renderOnline(users) {
      const online = users.filter(u => (u.status||'').toLowerCase() === 'online');
      document.getElementById('online-count').textContent = online.length;
      document.getElementById('online-sub').textContent = 'из ' + users.length + ' пользователей';
      document.getElementById('online-avatars').innerHTML = online.slice(0,6).map(u =>
        '<div class="mini-avatar" title="' + (u.username||'?') + '">' + (u.username||'?')[0].toUpperCase() + '</div>'
      ).join('');
    }

    // USER LIST
    function renderUsers(users) {
      const list = document.getElementById('users-list');
      if (!users || !users.length) { list.innerHTML = '<div class="msg">Нет пользователей</div>'; return; }
      renderOnline(users);
      list.innerHTML = users.map(function(u) {
        const isOnline = (u.status||'').toLowerCase() === 'online';
        const avHtml = u.avatar_url
          ? '<img src="' + u.avatar_url + '" alt="' + (u.username||'?')[0] + '">'
          : (u.username||'?')[0].toUpperCase();
        return '<div class="card ' + (u.id===myId?'me':'') + '">' +
          '<div class="avatar">' + avHtml + '</div>' +
          '<div class="info">' +
            '<div class="username">' + (u.username||'Без имени') + (u.id===myId?' <span style="color:#3ecf8e;font-size:.75rem">(я)</span>':'') + '</div>' +
            '<div class="status-text">' + (isOnline ? '🟢 Online' : '⚫ Offline') + '</div>' +
          '</div>' +
          '<div class="dot ' + (isOnline?'online':'offline') + '"></div>' +
        '</div>';
      }).join('');
    }

    let pollInterval = null;

    async function loadUsers() {
      const { data, error } = await db.from('profiles').select('*').order('username');
      if (error) { console.error('loadUsers error:', error); return; }
      if (data) renderUsers(data);
    }

    function subscribeRealtime() {
      if (rtSubscribed) return; rtSubscribed = true;
      db.channel('profiles-rt')
        .on('postgres_changes', { event:'*', schema:'public', table:'profiles' }, loadUsers)
        .subscribe(function(status) { console.log('Profiles RT:', status); });
      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(loadUsers, 5000);
    }

    // CHAT
    function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function timeStr(ts) { return new Date(ts).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}); }

    function buildMsgHtml(msg) {
      const isMine = msg.user_id === myId;
      const initial = (msg.username||'?')[0].toUpperCase();
      return '<div class="chat-msg ' + (isMine?'mine':'theirs') + '">' +
        '<div class="chat-msg-avatar">' + initial + '</div>' +
        '<div class="chat-msg-body">' +
          '<div class="chat-msg-name">' + (isMine ? 'Вы' : escapeHtml(msg.username||'?')) + '</div>' +
          '<div class="chat-msg-bubble">' + escapeHtml(msg.text) + '</div>' +
          '<div class="chat-msg-time">' + timeStr(msg.created_at) + '</div>' +
        '</div>' +
      '</div>';
    }

    async function loadMessages() {
      try {
        const { data, error } = await db.from('messages').select('*').order('created_at').limit(100);
        const box = document.getElementById('chat-messages');
        if (error) {
          console.error('Chat load error:', error);
          box.innerHTML = '<div class="chat-empty">⚠️ Ошибка чата: ' + error.message + '</div>';
          return;
        }
        if (!data || !data.length) { box.innerHTML = '<div class="chat-empty">Сообщений пока нет. Напиши первым! 👋</div>'; return; }
        box.innerHTML = data.map(buildMsgHtml).join('');
        box.scrollTop = box.scrollHeight;
      } catch(e) { console.error('Chat error:', e); }
    }

    function subscribeChat() {
      if (chatSubscribed) return; chatSubscribed = true;
      db.channel('messages-rt')
        .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages' }, function(p) {
          const box = document.getElementById('chat-messages');
          const empty = box.querySelector('.chat-empty');
          if (empty) empty.remove();
          box.insertAdjacentHTML('beforeend', buildMsgHtml(p.new));
          box.scrollTop = box.scrollHeight;
        })
        .subscribe(function(status) {
          if (status === 'CHANNEL_ERROR') { chatSubscribed = false; }
        });
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text || !myId) return;
      input.value = '';
      // Только поля которые есть в таблице: user_id, username, text
      const { error } = await db.from('messages').insert({ user_id: myId, username: myName, text: text });
      if (error) {
        console.error('Send error:', error);
        input.value = text;
        alert('Ошибка отправки: ' + error.message);
      }
    }

    // AUTH
    function switchTab(tab) {
      document.getElementById('login-form').style.display = tab==='login' ? 'block' : 'none';
      document.getElementById('register-form').style.display = tab==='register' ? 'block' : 'none';
      document.querySelectorAll('.auth-tab').forEach(function(b,i) {
        b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register'));
      });
      hideMsg();
    }
    function showMsg(t,type){ var e=document.getElementById('auth-msg'); e.textContent=t; e.className='auth-msg '+type; e.style.display='block'; }
    function hideMsg(){ document.getElementById('auth-msg').style.display='none'; }

    async function signInEmail() {
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-password').value;
      if (!email||!pass) return showMsg('Заполни все поля','error');
      const { error } = await db.auth.signInWithPassword({email: email, password: pass});
      if (error) showMsg('Неверный email или пароль','error');
    }

    async function signUpEmail() {
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const pass = document.getElementById('reg-password').value;
      if (!name||!email||!pass) return showMsg('Заполни все поля','error');
      if (pass.length<6) return showMsg('Пароль минимум 6 символов','error');
      const { data, error } = await db.auth.signUp({email: email, password: pass, options:{data:{full_name:name}}});
      if (error) return showMsg(error.message,'error');
      if (!data.session) showMsg('Письмо отправлено! Проверь почту.','success');
    }

    async function signInGoogle() {
      await db.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: window.location.href } });
    }

    async function signOut() {
      if (myId) await db.from('profiles').update({ status: 'Offline' }).eq('id', myId);
      await db.auth.signOut();
      myId = null; myName = '';
      rtSubscribed = false; chatSubscribed = false;
      showAuthScreen();
      document.getElementById('login-email').value = '';
      document.getElementById('login-password').value = '';
      switchTab('login');
    }

    async function ensureProfile(user) {
      const name = (user.user_metadata && (user.user_metadata.full_name || user.user_metadata.name)) || (user.email ? user.email.split('@')[0] : 'User');
      const avatar = (user.user_metadata && (user.user_metadata.avatar_url || user.user_metadata.picture)) || '';
      // Ставим myId/myName сразу, даже если DB-запросы упадут
      myId = user.id;
      myName = name;
      try {
        const { data, error } = await db.from('profiles').select('id').eq('id', user.id).maybeSingle();
        if (error) { console.error('profiles select error:', error); return; }
        if (!data) {
          const ins = await db.from('profiles').insert({ id: user.id, username: name, status: 'Online', avatar_url: avatar });
          if (ins.error) console.error('profiles insert error:', ins.error);
        } else {
          const upd = await db.from('profiles').update({ status: 'Online', avatar_url: avatar }).eq('id', user.id);
          if (upd.error) console.error('profiles update error:', upd.error);
        }
      } catch(e) { console.error('ensureProfile exception:', e); }
    }

    function updateHeader(user) {
      const name = user.user_metadata && (user.user_metadata.full_name || user.user_metadata.name) || user.email.split('@')[0] || 'User';
      const avatar = user.user_metadata && (user.user_metadata.avatar_url || user.user_metadata.picture) || '';
      document.getElementById('header-name').textContent = name;
      document.getElementById('header-email').textContent = user.email || '';
      const av = document.getElementById('header-avatar');
      av.innerHTML = avatar ? '<img src="' + avatar + '" alt="' + name[0] + '">' : name[0].toUpperCase();
    }

    async function onLogin(user) {
      try {
        await ensureProfile(user);
      } catch(e) {
        console.error('ensureProfile failed:', e);
        // Даже если профиль не создался — всё равно показываем приложение
        myId = user.id;
        myName = (user.user_metadata && (user.user_metadata.full_name || user.user_metadata.name)) || (user.email ? user.email.split('@')[0] : 'User');
      }
      try { updateHeader(user); } catch(e) { console.error('updateHeader:', e); }
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'block';
      try { await loadUsers(); } catch(e) { console.error('loadUsers:', e); }
      try { subscribeRealtime(); } catch(e) { console.error('subscribeRealtime:', e); }
      try { await loadMessages(); } catch(e) { console.error('loadMessages:', e); }
      try { subscribeChat(); } catch(e) { console.error('subscribeChat:', e); }
    }

    function showAuthScreen() {
      myId = null; myName = '';
      rtSubscribed = false; chatSubscribed = false;
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app-screen').style.display = 'none';
    }

    db.auth.onAuthStateChange(async function(event, session) {
      console.log('Auth event:', event, session ? 'has session' : 'no session');

      if (session && session.user) {
        // Флаг ставим СИНХРОННО — до любых async-операций
        gotSession = true;
        if (loginInProgress) return;
        loginInProgress = true;
        await onLogin(session.user);
        loginInProgress = false;

      } else if (event === 'SIGNED_OUT') {
        gotSession = false;
        showAuthScreen();

      } else if (event === 'INITIAL_SESSION' && !session) {
        // После OAuth-редиректа INITIAL_SESSION(null) приходит раньше SIGNED_IN.
        // Ждём — если SIGNED_IN придёт, gotSession будет true и экран не скроем.
        setTimeout(function() {
          if (!gotSession) showAuthScreen();
        }, 1200);
      }
    });
  </script>
</body>
</html>
